<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Academic Discussion</title>
  <link rel="stylesheet" href="/styles.css?v=20260405-academic-discussion-list-1"/>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="discussion-page">
      <a class="top-link" href="/writing.html">← Back to Writing</a>

      <header class="discussion-header">
        <h1>Academic Discussion</h1>
        <p>Choose a set to begin your practice.</p>
      </header>

      <div id="discussionRoot"></div>
    </div>
  </div>

  <script src="/academic-discussion-questions.js"></script>

  <script>
    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
        const writingLink = document.querySelector('[data-page="writing"]');
        if (writingLink) writingLink.classList.add('active');
      });

    const root = document.getElementById('discussionRoot');
    const discussionData = window.academicDiscussionQuestions || [];

    function getDiscussionDraftMeta(questionId) {
      const draft = localStorage.getItem(`academicDiscussionDraft_${questionId}`) || '';
      const savedAt = localStorage.getItem(`academicDiscussionDraftSavedAt_${questionId}`) || '';
      const wordCount = draft.trim() ? draft.trim().split(/\s+/).length : 0;

      return {
        hasDraft: draft.trim().length > 0,
        savedAt,
        wordCount
      };
    }

    function formatSavedAt(value) {
      if (!value) return 'No draft';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Draft saved';
      return `Saved ${date.toLocaleString()}`;
    }

    root.innerHTML = `
      <div class="discussion-list-grid">
        ${discussionData.map(item => {
          const meta = getDiscussionDraftMeta(item.id);

          return `
            <a class="discussion-card" href="/academic-discussion-practice.html?id=${item.id}">
              <div class="discussion-card-meta">
                <span>Set ${item.id}</span>
                <span>Discussion</span>
              </div>
              <div class="discussion-card-title">${item.title}</div>
              <div class="discussion-card-sub">
                ${item.professorQuestion ? item.professorQuestion.slice(0, 110) + '...' : 'Read the discussion and respond with your own ideas.'}
              </div>
              <div class="discussion-card-foot">
                <span>${meta.hasDraft ? formatSavedAt(meta.savedAt) : 'Click to open'}</span>
                <span>${meta.wordCount} words</span>
              </div>
            </a>
          `;
        }).join('')}
      </div>
    `;
  </script>
</body>
</html>
