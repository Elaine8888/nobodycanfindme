<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Write an Email Practice</title>
  <link rel="stylesheet" href="styles.css?v=20260409-email-rescore-timeup-1" />
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="email-page">
      <a class="top-link" href="write-an-email.html">← Back to Email List</a>

      <div class="email-practice-topbar">
        <div class="email-practice-progress" id="emailProgress"></div>

        <div class="email-practice-actions">
          <div class="email-timer" id="emailTimer">07:00</div>
          <button id="submitBtn" class="email-nav-btn dark">Submit</button>
        </div>
      </div>

      <div class="email-practice-layout">
        <section class="email-prompt-card">
          <div class="email-prompt-text" id="emailScenario"></div>
          <div class="email-prompt-title" id="emailPromptTitle"></div>
          <ul class="email-task-list" id="emailTaskList"></ul>
          <div class="email-note" id="emailNote"></div>
        </section>

        <section class="email-compose-card">
          <div class="email-compose-title">Your Response:</div>

          <div class="email-meta-line" id="emailTo"></div>
          <div class="email-meta-line" id="emailSubject"></div>

          <div class="email-toolbar">
            <div class="email-toolbar-buttons">
              <button id="saveDraftBtn" class="email-tool-btn primary">Save Draft</button>
              <button id="clearDraftBtn" class="email-tool-btn light">Clear Draft</button>
              <button id="rescoreBtn" class="email-tool-btn light">Rescore</button>
            </div>

            <div class="email-word-count" id="emailWordCount">0 words</div>
          </div>

          <textarea id="emailTextarea" class="email-textarea" spellcheck="true"></textarea>

          <div class="email-bottom-row">
            <div class="email-save-status" id="emailSaveStatus">Draft not saved yet.</div>

            <div class="email-bottom-actions">
              <button id="submitBtnBottom" class="email-nav-btn dark">Submit</button>
            </div>
          </div>

          <div id="scoreResultRoot"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="write-an-email-questions.js"></script>

  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => {
          link.classList.remove('active');
        });

        const writingLink = document.querySelector('[data-page="writing"]')
          || [...document.querySelectorAll('.nav-links a')].find(a => a.textContent.trim() === 'Writing');

        if (writingLink) writingLink.classList.add('active');
      });

    const params = new URLSearchParams(window.location.search);
    const requestedId = Number(params.get('id')) || 1;

    const questions = window.writeEmailQuestions || [];
    let currentIndex = questions.findIndex(q => q.id === requestedId);
    if (currentIndex < 0) currentIndex = 0;

    const progressEl = document.getElementById('emailProgress');
    const timerEl = document.getElementById('emailTimer');
    const scenarioEl = document.getElementById('emailScenario');
    const promptTitleEl = document.getElementById('emailPromptTitle');
    const taskListEl = document.getElementById('emailTaskList');
    const noteEl = document.getElementById('emailNote');
    const toEl = document.getElementById('emailTo');
    const subjectEl = document.getElementById('emailSubject');
    const textareaEl = document.getElementById('emailTextarea');
    const wordCountEl = document.getElementById('emailWordCount');
    const saveStatusEl = document.getElementById('emailSaveStatus');
    const scoreResultRoot = document.getElementById('scoreResultRoot');

    const saveDraftBtn = document.getElementById('saveDraftBtn');
    const clearDraftBtn = document.getElementById('clearDraftBtn');
    const rescoreBtn = document.getElementById('rescoreBtn');
    const submitBtn = document.getElementById('submitBtn');
    const submitBtnBottom = document.getElementById('submitBtnBottom');

    let timerId = null;
    let timeLeft = 420;
    let durationUsedSeconds = 0;
    let isScoring = false;
    let timeExpired = false;
    let autoScoredAfterTimeUp = false;

    function getCurrentQuestion() {
      return questions[currentIndex];
    }

    function draftKey(id) {
      return `writeEmailDraft_${id}`;
    }

    function savedAtKey(id) {
      return `writeEmailDraftSavedAt_${id}`;
    }

    function timerKey(id) {
      return `writeEmailTimer_${id}`;
    }

    function timeExpiredKey(id) {
      return `writeEmailTimeExpired_${id}`;
    }

    function resultKey(id) {
      return `writeEmailResult_${id}`;
    }

    function setSaveStatus(text) {
      saveStatusEl.textContent = text;
    }

    function updateWordCount() {
      const text = textareaEl.value.trim();
      const count = text ? text.split(/\s+/).length : 0;
      wordCountEl.textContent = `${count} words`;
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Number(seconds) || 0);
      const min = String(Math.floor(safeSeconds / 60)).padStart(2, '0');
      const sec = String(safeSeconds % 60).padStart(2, '0');
      return `${min}:${sec}`;
    }

    function saveTimer() {
      const q = getCurrentQuestion();
      localStorage.setItem(timerKey(q.id), String(timeLeft));
    }

    function loadTimer() {
      const q = getCurrentQuestion();
      const total = q.durationSeconds || 420;
      const saved = localStorage.getItem(timerKey(q.id));
      const expired = localStorage.getItem(timeExpiredKey(q.id)) === 'true';

      if (expired) {
        timeLeft = 0;
        timeExpired = true;
      } else if (saved !== null && saved !== '') {
        const value = Number(saved);
        timeLeft = Number.isFinite(value) ? Math.max(0, value) : total;
        timeExpired = timeLeft <= 0;
      } else {
        timeLeft = total;
        timeExpired = false;
      }

      durationUsedSeconds = total - timeLeft;
      timerEl.textContent = formatTime(timeLeft);
    }

    function saveDraft(showMessage = true) {
      const q = getCurrentQuestion();
      localStorage.setItem(draftKey(q.id), textareaEl.value);

      const now = new Date().toISOString();
      localStorage.setItem(savedAtKey(q.id), now);

      if (showMessage) {
        const display = new Date(now).toLocaleString();
        setSaveStatus(`Draft saved locally at ${display}.`);
      }
    }

    function loadDraft() {
      const q = getCurrentQuestion();
      const saved = localStorage.getItem(draftKey(q.id)) || '';
      const savedAt = localStorage.getItem(savedAtKey(q.id)) || '';

      textareaEl.value = saved;
      updateWordCount();

      if (savedAt) {
        const display = new Date(savedAt).toLocaleString();
        setSaveStatus(`Draft loaded. Last saved at ${display}.`);
      } else {
        setSaveStatus('Draft not saved yet.');
      }
    }

    function getStoredResult() {
      const q = getCurrentQuestion();
      const raw = localStorage.getItem(resultKey(q.id));
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function saveResult(result) {
      const q = getCurrentQuestion();
      localStorage.setItem(resultKey(q.id), JSON.stringify(result));
    }

    function clearStoredResult() {
      const q = getCurrentQuestion();
      localStorage.removeItem(resultKey(q.id));
    }

    function showStoredResultIfAny() {
      const result = getStoredResult();
      if (!result) return;
      showScoreResult(result, true);
    }

    function setEditingState(expired) {
      if (expired) {
        textareaEl.disabled = true;
        saveDraftBtn.disabled = true;
        submitBtn.disabled = false;
        submitBtnBottom.disabled = false;
        rescoreBtn.disabled = false;
        clearDraftBtn.disabled = false;
        timerEl.textContent = '00:00';
      } else {
        textareaEl.disabled = false;
        saveDraftBtn.disabled = false;
        submitBtn.disabled = false;
        submitBtnBottom.disabled = false;
        rescoreBtn.disabled = false;
        clearDraftBtn.disabled = false;
      }
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function markTimeExpired() {
      const q = getCurrentQuestion();
      timeExpired = true;
      timeLeft = 0;
      timerEl.textContent = '00:00';
      localStorage.setItem(timerKey(q.id), '0');
      localStorage.setItem(timeExpiredKey(q.id), 'true');
      setEditingState(true);
    }

    async function handleTimeUp() {
      markTimeExpired();
      saveDraft(false);

      const studentText = textareaEl.value.trim();
      if (!studentText) {
        setSaveStatus('Time is up. No response was submitted because the answer box is empty.');
        return;
      }

      if (!autoScoredAfterTimeUp) {
        autoScoredAfterTimeUp = true;
        setSaveStatus('Time is up. Your response is being scored automatically...');
        await scoreWithAI(true);
      }
    }

    function startTimer() {
      stopTimer();

      if (timeExpired) {
        timerEl.textContent = '00:00';
        setEditingState(true);
        return;
      }

      setEditingState(false);
      timerEl.textContent = formatTime(timeLeft);

      timerId = setInterval(async () => {
        if (timeLeft > 0) {
          timeLeft--;
          durationUsedSeconds++;
          timerEl.textContent = formatTime(timeLeft);
          saveTimer();

          if (timeLeft === 0) {
            stopTimer();
            await handleTimeUp();
          }
        }
      }, 1000);
    }

    function renderQuestion() {
      const q = getCurrentQuestion();

      progressEl.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      scenarioEl.textContent = q.scenario || '';
      promptTitleEl.textContent = q.promptTitle || '';
      taskListEl.innerHTML = (q.tasks || []).map(task => `<li>${task}</li>`).join('');
      noteEl.textContent = q.note || '';
      toEl.textContent = `To: ${q.to || ''}`;
      subjectEl.textContent = `Subject: ${q.subject || ''}`;

      autoScoredAfterTimeUp = false;
      loadDraft();
      loadTimer();
      scoreResultRoot.innerHTML = '';
      showStoredResultIfAny();

      if (timeExpired) {
        setEditingState(true);
        setSaveStatus('Time is up. You can still click Submit or Rescore to get a score for the saved response.');
      } else {
        startTimer();
      }
    }

    textareaEl.addEventListener('input', () => {
      if (timeExpired) return;
      updateWordCount();
      saveDraft(false);
      setSaveStatus('Draft auto-saved locally.');
    });

    saveDraftBtn.addEventListener('click', () => {
      saveDraft(true);
    });

    clearDraftBtn.addEventListener('click', () => {
      const q = getCurrentQuestion();

      stopTimer();

      localStorage.removeItem(draftKey(q.id));
      localStorage.removeItem(savedAtKey(q.id));
      localStorage.removeItem(timerKey(q.id));
      localStorage.removeItem(timeExpiredKey(q.id));
      clearStoredResult();

      textareaEl.value = '';
      updateWordCount();
      scoreResultRoot.innerHTML = '';

      timeLeft = q.durationSeconds || 420;
      durationUsedSeconds = 0;
      timeExpired = false;
      autoScoredAfterTimeUp = false;
      isScoring = false;

      setEditingState(false);
      timerEl.textContent = formatTime(timeLeft);
      setSaveStatus('Draft, timer, and score cleared.');

      startTimer();
    });

    submitBtn.addEventListener('click', async () => {
      await scoreWithAI(false);
    });

    submitBtnBottom.addEventListener('click', async () => {
      await scoreWithAI(false);
    });

    rescoreBtn.addEventListener('click', async () => {
      await scoreWithAI(false);
    });

    async function scoreWithAI(isAutoSubmit = false) {
      const q = getCurrentQuestion();
      const studentText = textareaEl.value.trim();

      if (!studentText) {
        alert("请先写点内容再评分");
        return;
      }

      if (isScoring) return;
      isScoring = true;

      const topBtnText = submitBtn.textContent;
      const bottomBtnText = submitBtnBottom.textContent;
      const rescoreBtnText = rescoreBtn.textContent;

      submitBtn.disabled = true;
      submitBtnBottom.disabled = true;
      rescoreBtn.disabled = true;

      submitBtn.textContent = 'Scoring...';
      submitBtnBottom.textContent = 'Scoring...';
      rescoreBtn.textContent = 'Scoring...';

      setSaveStatus(isAutoSubmit ? "Time is up. AI is scoring..." : "AI正在评分中，请稍等...");

      try {
        saveDraft(false);

        const total = q.durationSeconds || 420;
        const used = timeExpired ? total : (total - timeLeft);
        durationUsedSeconds = Math.max(0, used);

        const res = await fetch('https://hanginthere-api.vercel.app/api/score-write-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            promptTitle: q.promptTitle,
            scenario: q.scenario,
            tasks: q.tasks,
            to: q.to,
            subject: q.subject,
            studentResponse: studentText
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "评分失败");
        }

        const finalScoreNumber = Number(data.finalScore);
        const scoreText = Number.isFinite(finalScoreNumber)
          ? `${finalScoreNumber}/5`
          : `${data.finalScore}/5`;

        const resultToStore = {
          finalScore: data.finalScore,
          scoreText,
          summary: data.summary || "",
          problems: Array.isArray(data.problems) ? data.problems : [],
          suggestions: Array.isArray(data.suggestions) ? data.suggestions : [],
          taskCompletion: {
            score: Number.isFinite(Number(data?.taskCompletion?.score))
              ? Number(data.taskCompletion.score)
              : null,
            comment: data?.taskCompletion?.comment || ""
          },
          contentSupport: {
            score: Number.isFinite(Number(data?.contentSupport?.score))
              ? Number(data.contentSupport.score)
              : null,
            comment: data?.contentSupport?.comment || ""
          },
          languageAccuracy: {
            score: Number.isFinite(Number(data?.languageAccuracy?.score))
              ? Number(data.languageAccuracy.score)
              : null,
            comment: data?.languageAccuracy?.comment || ""
          },
          durationUsedSeconds,
          autoSubmitted: isAutoSubmit,
          scoredAt: new Date().toISOString()
        };

        saveResult(resultToStore);
        showScoreResult(resultToStore, false);

      } catch (err) {
        console.error(err);
        alert("评分出错：" + err.message);
        setSaveStatus("评分失败");
      } finally {
        isScoring = false;

        submitBtn.disabled = false;
        submitBtnBottom.disabled = false;
        rescoreBtn.disabled = false;

        submitBtn.textContent = topBtnText;
        submitBtnBottom.textContent = bottomBtnText;
        rescoreBtn.textContent = rescoreBtnText;

        if (timeExpired) {
          setEditingState(true);
        }
      }
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDimension(title, key, item) {
      const scorePart = item && item.score !== null && item.score !== undefined
        ? `<div style="font-weight:700; color:#0f172a; margin-bottom:4px;">${title}：${item.score}/5</div>`
        : `<div style="font-weight:700; color:#0f172a; margin-bottom:4px;">${title}</div>`;

      const commentPart = item && item.comment
        ? `<div style="color:#334155; line-height:1.7;">${escapeHtml(item.comment)}</div>`
        : `<div style="color:#94a3b8; line-height:1.7;">暂无该项评价。</div>`;

      return `
        <div data-key="${key}" style="padding:12px 14px; border:1px solid #e2e8f0; border-radius:10px; background:#ffffff;">
          ${scorePart}
          ${commentPart}
        </div>
      `;
    }

    function showScoreResult(result, fromStorage = false) {
      const old = document.querySelector('.ai-score-box');
      if (old) old.remove();

      const container = document.createElement('div');
      container.className = 'ai-score-box';
      container.style.marginTop = '20px';
      container.style.padding = '18px';
      container.style.background = '#f8f9fb';
      container.style.borderRadius = '12px';
      container.style.border = '1px solid #e2e8f0';

      const problemsHtml = (result.problems || []).length
        ? (result.problems || []).map(p => `<li>${escapeHtml(p)}</li>`).join('')
        : '<li>暂无明显问题。</li>';

      const suggestionsHtml = (result.suggestions || []).length
        ? (result.suggestions || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')
        : '<li>暂无建议。</li>';

      const autoNote = result.autoSubmitted
        ? '<p style="margin:0 0 12px 0; color:#b45309; font-weight:600;">Time is up. This response was scored automatically.</p>'
        : '';

      container.innerHTML = `
        <h3 style="margin:0 0 14px 0; color:#1e293b;">🎯 Score: ${escapeHtml(result.scoreText)}</h3>

        ${autoNote}

        <div style="display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:16px;">
          ${renderDimension('任务完成度', 'taskCompletion', result.taskCompletion)}
          ${renderDimension('内容与展开', 'contentSupport', result.contentSupport)}
          ${renderDimension('语言与准确性', 'languageAccuracy', result.languageAccuracy)}
        </div>

        <p style="margin:0 0 12px 0; color:#1e293b; line-height:1.8;">
          <strong>📌 总评：</strong>${escapeHtml(result.summary || '')}
        </p>

        <p style="margin:0 0 6px 0;"><strong>📌 Problems：</strong></p>
        <ul style="margin-top:6px; color:#334155; line-height:1.8;">
          ${problemsHtml}
        </ul>

        <p style="margin:12px 0 6px 0;"><strong>🛠 Suggestions：</strong></p>
        <ul style="margin-top:6px; color:#334155; line-height:1.8;">
          ${suggestionsHtml}
        </ul>

        <p style="margin:12px 0 0 0; color:#64748b;">
          Time Used: ${formatTime(result.durationUsedSeconds || 0)}
        </p>
      `;

      scoreResultRoot.appendChild(container);

      if (fromStorage) {
        setSaveStatus("已加载该题的历史评分结果。你仍然可以继续点击 Submit 或 Rescore 重新评分。");
      } else {
        setSaveStatus("评分完成 ✅");
      }
    }

    renderQuestion();
  </script>
</body>
</html>
