<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete the Words</title>
  <style>
:root{
  --primary:#4a90e2;
  --primary-soft:#eef5ff;
  --success:#28a745;
  --error:#dc3545;
  --bg:#f4f7f9;
  --text:#333;
  --muted:#6b7280;
  --card:#fff;
  --border:#e5e7eb;
}
*{box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  margin:0;
  color:var(--text);
}
.page{
  max-width:980px;
  margin:0 auto;
  padding:24px 16px 40px;
}
.hero{
  background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #dbeafe;
  border-radius:20px;
  padding:28px 24px;
  box-shadow:0 8px 30px rgba(74,144,226,.08);
  margin-bottom:22px;
}
.hero h1{
  margin:0 0 10px;
  color:var(--primary);
  font-size:30px;
}
.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.7;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.back-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--primary);
  text-decoration:none;
  font-weight:600;
}
.timer{
  font-weight:700;
  color:var(--primary);
  background:var(--primary-soft);
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #d0e3ff;
  font-variant-numeric: tabular-nums;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 18px 16px;
  box-shadow:0 4px 16px rgba(0,0,0,.04);
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  text-decoration:none;
  color:inherit;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.06);
  border-color:#cfe1ff;
}
.card .meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:12px;
}
.badge{
  display:inline-flex;
  align-items:center;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.badge-none{background:#f3f4f6;color:#6b7280}
.badge-done{background:#eafaf1;color:#166534}
.card h3{
  margin:0 0 8px;
  font-size:18px;
  line-height:1.4;
}
.card .date{
  color:var(--muted);
  font-size:13px;
  white-space:pre-line;
}
.panel{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.04);
}
.panel-head{
  padding:20px 22px 0;
}
.panel-head h2{
  margin:0 0 8px;
  color:var(--primary);
}
.panel-head .sub{
  color:var(--muted);
  font-size:14px;
  white-space:pre-line;
}
.passage{
  padding:22px;
  line-height:2;
  font-size:18px;
  white-space:pre-wrap;
  word-break:break-word;
}
.word-group{
  display:inline-flex;
  align-items:flex-end;
  gap:0;
  padding:1px 2px;
  border-radius:8px;
}
.word-group.active{
  background:var(--primary-soft);
}
.prefix,.suffix{
  font-weight:700;
  color:#2c3e50;
}
.char-input{
  width:1.15em;
  text-align:center;
  font-size:18px;
  border:none;
  border-bottom:2px solid #94a3b8;
  margin:0 1px;
  padding:0 0 2px;
  background:transparent;
  outline:none;
  border-radius:0;
}
.char-input:focus{
  border-bottom-color:var(--primary);
}
.char-input.correct{
  border-bottom-color:var(--success);
  background:#effcf3;
}
.char-input.wrong{
  border-bottom-color:var(--error);
  background:#fff1f2;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:0 22px 22px;
}
button,.button-link{
  appearance:none;
  border:none;
  border-radius:12px;
  padding:11px 18px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
button.primary,.button-link.primary{
  background:var(--primary);
  color:#fff;
}
button.secondary,.button-link.secondary{
  background:#fff;
  color:#374151;
  border:1px solid #d1d5db;
}
button[disabled]{
  opacity:.55;
  cursor:not-allowed;
}
.result{
  margin:0 22px 18px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:16px;
}
.score{
  font-size:22px;
  font-weight:800;
  margin-bottom:6px;
}
.feedback{
  color:#4b5563;
  margin-bottom:8px;
}
.review-list{
  display:grid;
  gap:8px;
}
.review-item{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 12px;
  border-radius:12px;
  font-size:14px;
}
.review-item.correct{background:#eafaf1}
.review-item.wrong{background:#fdecec}
.review-item .idx{font-weight:800; min-width:22px}
.review-item .full{font-weight:700}
.hidden{display:none !important}
.footer-note{
  margin-top:18px;
  color:var(--muted);
  font-size:13px;
}
@media (max-width:640px){
  .hero h1{font-size:24px}
  .passage{font-size:17px; line-height:1.9}
  .char-input{font-size:17px}
}
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="back-link" href="index.html">← 返回目录</a>
      <div class="timer" id="timer">⏱ 00:00</div>
    </div>

    <section class="panel">
      <div class="panel-head">
        <h2 id="quiz-title"></h2>
        <div class="sub" id="quiz-date"></div>
      </div>
      <div class="passage" id="quiz-content"></div>
      <div class="result hidden" id="result-box">
        <div class="score" id="score-result"></div>
        <div class="feedback" id="feedback-result"></div>
        <div class="review-list" id="review-list"></div>
      </div>
      <div class="actions">
        <button class="primary" id="submit-btn">提交</button>
        <button class="secondary hidden" id="retry-btn">再做一次</button>
        <a class="button-link secondary hidden" id="next-btn" href="#">下一题</a>
      </div>
    </section>
  </div>

  <script src="data/questions.js"></script>
  <script>
    const STORAGE_KEY = 'ctw_scores_v1';
    const params = new URLSearchParams(location.search);
    const qid = Number(params.get('id') || '1');
    const current = questions.find(q => q.id === qid) || questions[0];
    const currentIndex = questions.findIndex(q => q.id === current.id);
    const nextQuestion = currentIndex >= 0 && currentIndex < questions.length - 1 ? questions[currentIndex + 1] : null;

    let timer = null;
    let startTime = Date.now();
    let submitted = false;

    const timerEl = document.getElementById('timer');
    const titleEl = document.getElementById('quiz-title');
    const dateEl = document.getElementById('quiz-date');
    const contentEl = document.getElementById('quiz-content');
    const resultBox = document.getElementById('result-box');
    const scoreEl = document.getElementById('score-result');
    const feedbackEl = document.getElementById('feedback-result');
    const reviewList = document.getElementById('review-list');
    const submitBtn = document.getElementById('submit-btn');
    const retryBtn = document.getElementById('retry-btn');
    const nextBtn = document.getElementById('next-btn');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTimer() {
      const seconds = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = `⏱ ${formatTime(seconds)}`;
    }

    function renderQuestion() {
      titleEl.textContent = `练习 ${current.id}: ${current.title || `Practice ${current.id}`}`;
      dateEl.textContent = current.date || '';
      let html = current.template;
      current.items.forEach((item, idx) => {
        let inputs = `<span class="word-group" data-group="${idx}"><span class="prefix">${escapeHtml(item.p || '')}</span>`;
        for (let i = 0; i < item.g; i++) {
          inputs += `<input type="text" maxlength="1" class="char-input" data-ans-idx="${idx}" inputmode="text" autocomplete="off" autocapitalize="none" spellcheck="false">`;
        }
        inputs += `<span class="suffix">${escapeHtml(item.s || '')}</span></span>`;
        html = html.replace(`{${idx}}`, inputs);
      });
      contentEl.innerHTML = html;

      const groups = Array.from(document.querySelectorAll('.word-group'));
      const inputs = Array.from(document.querySelectorAll('.char-input'));

      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          let value = input.value;
          if (!value) return;
          value = value.slice(-1);
          input.value = value;
          const next = inputs[index + 1];
          if (next) next.focus();
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && input.value === '') {
            const prev = inputs[index - 1];
            if (prev) prev.focus();
          }
          if (e.key === 'Enter') {
            e.preventDefault();
            if (!submitted) checkScore();
          }
        });

        input.addEventListener('focus', () => {
          groups.forEach(g => g.classList.remove('active'));
          const group = input.closest('.word-group');
          if (group) group.classList.add('active');
        });

        input.addEventListener('blur', () => {
          const group = input.closest('.word-group');
          if (group) group.classList.remove('active');
        });
      });

      if (inputs[0]) inputs[0].focus();
    }

    function teacherFeedback(score, total) {
      const ratio = total ? score / total : 0;
      if (ratio === 1) return 'Excellent！词块识别非常稳定。';
      if (ratio >= 0.7) return '很不错，注意词尾变化和固定搭配。';
      if (ratio >= 0.4) return '继续练，尽量按词块整体提取，不要逐字猜。';
      return '建议先复习词汇和词形变化，再回来重做一遍。';
    }

    function checkScore() {
      clearInterval(timer);
      submitted = true;
      const seconds = Math.floor((Date.now() - startTime) / 1000);
      let correct = 0;
      reviewList.innerHTML = '';

      current.items.forEach((item, idx) => {
        const inputs = Array.from(document.querySelectorAll(`.char-input[data-ans-idx="${idx}"]`));
        const user = inputs.map(el => el.value || '').join('');
        const ok = user.toLowerCase() === String(item.a).toLowerCase();

        if (ok) correct++;
        inputs.forEach(el => {
          el.disabled = true;
          el.classList.add(ok ? 'correct' : 'wrong');
        });

        const review = document.createElement('div');
        review.className = `review-item ${ok ? 'correct' : 'wrong'}`;
        review.innerHTML = `
          <span class="idx">${idx + 1}.</span>
          <span>你的答案：${escapeHtml(user || '（空）')}</span>
          <span>正确答案：<span class="full">${escapeHtml(item.a)}</span></span>
        `;
        reviewList.appendChild(review);
      });

      scoreEl.textContent = `得分：${correct} / ${current.items.length} ｜ 用时：${formatTime(seconds)}`;
      feedbackEl.textContent = teacherFeedback(correct, current.items.length);
      resultBox.classList.remove('hidden');

      submitBtn.classList.add('hidden');
      retryBtn.classList.remove('hidden');

      if (nextQuestion) {
        nextBtn.href = `practice.html?id=${nextQuestion.id}`;
        nextBtn.classList.remove('hidden');
      }

      const scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (scores[current.id] === undefined || correct > scores[current.id]) {
        scores[current.id] = correct;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
      }
    }

    function resetQuestion() {
      submitted = false;
      resultBox.classList.add('hidden');
      scoreEl.textContent = '';
      feedbackEl.textContent = '';
      reviewList.innerHTML = '';
      submitBtn.classList.remove('hidden');
      retryBtn.classList.add('hidden');
      nextBtn.classList.add('hidden');
      renderQuestion();
      startTime = Date.now();
      updateTimer();
      clearInterval(timer);
      timer = setInterval(updateTimer, 1000);
    }

    submitBtn.addEventListener('click', checkScore);
    retryBtn.addEventListener('click', resetQuestion);

    renderQuestion();
    startTime = Date.now();
    updateTimer();
    timer = setInterval(updateTimer, 1000);
  </script>
</body>
</html>
