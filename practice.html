<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Practice</title>
</head>
<body>
<a href="index.html">← 返回</a>
<div id="content"></div>

<script src="data/questions.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = Number(params.get("id"));
const questionList = window.questions || [];
const q = questionList.find(x => x.id === id);

if (!q) {
  document.getElementById("content").innerText = "题目加载失败";
} else {
  document.getElementById("content").innerText = q.raw || JSON.stringify(q, null, 2);
}
</script>
</body>
</html>
