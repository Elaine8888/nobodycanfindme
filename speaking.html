<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaking Practice</title>
  <link rel="stylesheet" href="./styles.css?v=20260403-speaking-ui-1" />
</head>

<body>

<div class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">Hang in There</a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="reading.html">Reading</a>
      <a href="listening.html">Listening</a>
      <a href="speaking.html" class="active">Speaking</a>
      <a href="writing.html">Writing</a>
    </div>
  </div>
</div>

<div class="page-shell">

  <!-- Header -->
  <div class="speaking-hub">

    <div class="speaking-hub-header">
      <h1>Speaking Practice</h1>
      <p>Select a question type, then choose a set to begin.</p>
    </div>

    <!-- 类型切换 -->
    <div class="speaking-type-row">
      <div class="speaking-type-label">题型：</div>

      <div class="speaking-type-tabs">
        <button class="speaking-type-tab active" data-type="lr">
          Listen and Repeat
        </button>

        <button class="speaking-type-tab" data-type="interview">
          Take an Interview
        </button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="speaking-panel">

      <div class="speaking-panel-head">
        <h2 id="panel-title">Listen and Repeat</h2>
        <p id="panel-desc">Choose a set to begin your practice.</p>
      </div>

      <div id="speaking-list" class="speaking-list-grid"></div>

    </div>

  </div>

</div>

<script src="./site-data.js"></script>
<script src="./data/interview.js"></script>

<script>

const listEl = document.getElementById("speaking-list");
const titleEl = document.getElementById("panel-title");

const tabs = document.querySelectorAll(".speaking-type-tab");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const type = tab.dataset.type;
    render(type);
  });
});

function render(type){
  listEl.innerHTML = "";

  if(type === "lr"){
    titleEl.textContent = "Listen and Repeat";

    const sets = siteData.speaking.types[0].sets;

    sets.forEach((set,index)=>{
      const card = document.createElement("a");
      card.className = "speaking-card";
      card.href = `listen-and-repeat.html?id=${set.id}`;

      card.innerHTML = `
        <div class="speaking-card-meta">
          <span>Set ${index+1}</span>
          <span>${set.id}</span>
        </div>

        <div class="speaking-card-title">${set.title}</div>

        <div class="speaking-card-foot">
          ${set.scenes.length} scenes
        </div>
      `;

      listEl.appendChild(card);
    });
  }

  if(type === "interview"){
    titleEl.textContent = "Take an Interview";

    interviewData.forEach((item,index)=>{
      const card = document.createElement("a");
      card.className = "speaking-card";
      card.href = `interview-detail.html?id=${item.id}`;

      card.innerHTML = `
        <div class="speaking-card-meta">
          <span>Set ${index+1}</span>
          <span>${item.questions.length} Qs</span>
        </div>

        <div class="speaking-card-title">${item.topic}</div>

        <div class="speaking-card-foot">
          Topic Practice
        </div>
      `;

      listEl.appendChild(card);
    });
  }
}

// 默认加载
render("lr");

</script>

</body>
</html>
