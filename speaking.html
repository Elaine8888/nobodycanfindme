<div class="page-shell">

  <header class="hero card">
    <h1>Speaking Practice</h1>
    <p>Select a question type, then choose a set.</p>
  </header>

  <!-- 题型按钮 -->
  <div class="type-tabs">
    <button class="type-tab active" onclick="switchType('repeat')">
      Listen and Repeat
    </button>

    <button class="type-tab" onclick="switchType('interview')">
      Take an Interview
    </button>
  </div>

  <!-- 内容 -->
  <div id="type-content"></div>

</div>

<script>
let currentType = "repeat";

function switchType(type) {
  currentType = type;

  document.querySelectorAll(".type-tab").forEach(btn => {
    btn.classList.remove("active");
  });
  event.target.classList.add("active");

  renderSets();
}

function renderSets() {
  const container = document.getElementById("type-content");

  container.innerHTML = `
    <h2>${currentType === "repeat" ? "Listen and Repeat" : "Take an Interview"}</h2>
    <p>Each set contains 10 questions.</p>

    <div class="set-row">
      ${Array.from({ length: 10 }).map((_, i) => `
        <div class="set-btn">${i + 1}</div>
      `).join("")}
      <span class="set-score">0/10</span>
    </div>
  `;
}

renderSets();
</script>
