<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TOEFL Complete the Words</title>
<style>
body {font-family: Arial; background:#f5f7fb; margin:0; padding:20px;}
.container {max-width:900px; margin:auto;}
.card {display:block; padding:15px; margin:10px 0; background:white; border-radius:10px; text-decoration:none; color:#333;}
.badge {font-size:12px; padding:3px 6px; border-radius:6px;}
.badge-none {background:#eee;}
.badge-done {background:#4caf50; color:white;}
</style>
</head>
<body>
<div class="container">
<h1>TOEFL Complete the Words</h1>
<div id="question-grid"></div>
</div>

<script src="data/questions.js"></script>
<script>
const STORAGE_KEY = 'ctw_scores_v1';
const scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
const grid = document.getElementById('question-grid');
const questionList = window.questions || [];

if (!questionList.length) {
  grid.innerHTML = '<div style="color:#dc3545;">题库加载失败，请检查 data/questions.js</div>';
}

questionList.forEach(q => {
  const score = scores[q.id];
  const total = q.items ? q.items.length : 10;
  const done = score !== undefined;

  const card = document.createElement('a');
  card.className = 'card';
  card.href = `practice.html?id=${q.id}`;

  card.innerHTML = `
    <div>
      <span class="badge ${done ? 'badge-done' : 'badge-none'}">
        ${done ? `最高分 ${score} / ${total}` : '未开始'}
      </span>
    </div>
    <h3>${q.title || `Practice ${q.id}`}</h3>
  `;

  grid.appendChild(card);
});
</script>
</body>
</html>
