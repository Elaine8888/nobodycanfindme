<body>
  <div class="navbar">
    <div class="nav-inner">
      <div class="nav-left"></div>

      <div class="nav-links">
        <a href="#" data-section="home" class="active">Home</a>
        <a href="#" data-section="reading">Reading</a>
        <a href="#" data-section="listening">Listening</a>
        <a href="#" data-section="speaking">Speaking</a>
        <a href="#" data-section="writing">Writing</a>
      </div>
    </div>
  </div>

  <div class="page-shell">
    <header class="hero card">
      <div class="badge">Practice Hub</div>
      <h1 id="heroTitle">Hang in There</h1>
      <p id="heroText">
        Find your practice by section.<br>
        All exercises are organized into <strong>Reading, Listening, Speaking, and Writing</strong>.<br>
        Select a question type and start practicing.
      </p>
      <p class="encourage" id="heroEncourage">Keep going — every bit of practice helps you grow stronger.</p>
    </header>

    <main class="grid" id="contentGrid"></main>
  </div>

  <script>
    const sections = {
      home: {
        title: "Hang in There",
        text: `
          Find your practice by section.<br>
          All exercises are organized into <strong>Reading, Listening, Speaking, and Writing</strong>.<br>
          Select a question type and start practicing.
        `,
        encourage: "Keep going — every bit of practice helps you grow stronger.",
        cards: [
          {
            icon: "📖",
            title: "Reading",
            desc: "Build reading speed, structure awareness, and question skills.",
            tags: [
              { text: "Complete the Words", href: "complete-the-words.html", active: true },
              { text: "Read in Daily Life", href: "read-in-daily-life.html", active: true },
              { text: "Read an Academic Passage", href: "read-an-academic-passage.html", active: true }
            ]
          },
          {
            icon: "🎧",
            title: "Listening",
            desc: "Train response recognition, conversations, announcements, and talks.",
            tags: [
              { text: "Listen and Choose a Response", href: "listening.html", active: true },
              { text: "Listen to a Conversation", href: "listening.html", active: true },
              { text: "Listen to an Announcement", href: "listening.html", active: true },
              { text: "Listen to an Academic Talk", href: "listening.html", active: true }
            ]
          },
          {
            icon: "🗣️",
            title: "Speaking",
            desc: "Practice speaking tasks and simulate test scenarios.",
            tags: [
              { text: "Listen and Repeat", href: "speaking.html", active: true },
              { text: "Take an Interview", href: "speaking-interview.html", active: true }
            ]
          },
          {
            icon: "✍️",
            title: "Writing",
            desc: "Develop sentence building, email writing, and academic discussion skills.",
            tags: [
              { text: "Build a Sentence", href: "writing.html", active: false },
              { text: "Write an Email", href: "writing.html", active: false },
              { text: "Academic Discussion", href: "writing.html", active: true }
            ]
          }
        ]
      },

      reading: {
        title: "Reading",
        text: `Choose a reading task and start practicing.`,
        encourage: "Focus on structure, speed, and accuracy.",
        cards: [
          {
            icon: "📝",
            title: "Complete the Words",
            desc: "Train grammar, collocation, and context prediction under time pressure.",
            tags: [{ text: "Start Practice", href: "complete-the-words.html", active: true }]
          },
          {
            icon: "📄",
            title: "Read in Daily Life",
            desc: "Practice scanning and real-life reading with everyday materials.",
            tags: [{ text: "Start Practice", href: "read-in-daily-life.html", active: true }]
          },
          {
            icon: "🎓",
            title: "Read an Academic Passage",
            desc: "Improve academic reading, insertion, and comprehension skills.",
            tags: [{ text: "Start Practice", href: "read-an-academic-passage.html", active: true }]
          }
        ]
      },

      listening: {
        title: "Listening",
        text: `Choose a listening task to build recognition and comprehension skills.`,
        encourage: "More listening practice will be added here soon.",
        cards: [
          {
            icon: "💬",
            title: "Listen and Choose a Response",
            desc: "Recognize the most appropriate response in context.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          },
          {
            icon: "👥",
            title: "Listen to a Conversation",
            desc: "Practice campus-style dialogues and follow the main ideas.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          },
          {
            icon: "📢",
            title: "Listen to an Announcement",
            desc: "Understand public messages and important details.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          },
          {
            icon: "🏫",
            title: "Listen to an Academic Talk",
            desc: "Train your ability to follow lectures and academic explanations.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          }
        ]
      },

      speaking: {
        title: "Speaking",
        text: `Choose a speaking task and get familiar with common test scenarios.`,
        encourage: "Speak clearly, repeat confidently, and build fluency step by step.",
        cards: [
          {
            icon: "🔊",
            title: "Listen and Repeat",
            desc: "Hear first, then repeat clearly. Text stays hidden until needed.",
            tags: [{ text: "Start Practice", href: "speaking.html", active: true }]
          },
          {
            icon: "🎤",
            title: "Take an Interview",
            desc: "Practice topic-based interview questions with four prompts.",
            tags: [{ text: "Start Practice", href: "speaking-interview.html", active: true }]
          }
        ]
      },

      writing: {
        title: "Writing",
        text: `Choose a writing task and practice clear, organized responses.`,
        encourage: "Write with structure, clarity, and control.",
        cards: [
          {
            icon: "🧩",
            title: "Build a Sentence",
            desc: "Practice sentence formation and control of structure.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          },
          {
            icon: "📧",
            title: "Write an Email",
            desc: "Learn to respond clearly and appropriately in email tasks.",
            tags: [{ text: "Coming Soon", href: "#", active: false }]
          },
          {
            icon: "✏️",
            title: "Academic Discussion",
            desc: "Respond to discussion prompts with your own ideas.",
            tags: [{ text: "Start Practice", href: "writing.html", active: true }]
          }
        ]
      }
    };

    const navLinks = document.querySelectorAll(".nav-links a");
    const heroTitle = document.getElementById("heroTitle");
    const heroText = document.getElementById("heroText");
    const heroEncourage = document.getElementById("heroEncourage");
    const contentGrid = document.getElementById("contentGrid");

    function renderSection(key) {
      const section = sections[key];
      heroTitle.textContent = section.title;
      heroText.innerHTML = section.text;
      heroEncourage.textContent = section.encourage;

      contentGrid.innerHTML = "";

      section.cards.forEach(card => {
        const el = document.createElement("section");
        el.className = "card module-card";
        el.innerHTML = `
          <div class="icon">${card.icon}</div>
          <h2>${card.title}</h2>
          <p class="desc">${card.desc}</p>
          <div class="tag-list">
            ${card.tags.map(tag =>
              tag.active
                ? `<a href="${tag.href}" class="tag active">${tag.text}</a>`
                : `<span class="tag">${tag.text}</span>`
            ).join("")}
          </div>
        `;
        contentGrid.appendChild(el);
      });

      navLinks.forEach(link => {
        link.classList.toggle("active", link.dataset.section === key);
      });
    }

    navLinks.forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        renderSection(link.dataset.section);
      });
    });

    renderSection("home");
  </script>
</body>
</html>
