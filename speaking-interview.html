<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Take an Interview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ 统一样式 -->
  <link rel="stylesheet" href="/styles.css?v=20260331navfinal1">

  <style>
    .page-shell {
      max-width: 900px;
      margin: 100px auto 40px;
      padding: 0 16px;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #357bd8;
    }
  </style>
</head>

<body>

  <!-- ✅ Navbar -->
  <div id="navbar"></div>

  <div class="page-shell">
    <header class="hero card">
      <h1>Take an Interview</h1>
      <p>Practice topic-based interview questions with structured prompts.</p>
    </header>

    <div id="topic-list" class="card-list"></div>
  </div>

  <script src="/data/interview.js"></script>

  <!-- ✅ Navbar加载 + 高亮 -->
  <script>
    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));

        const speakingLink = document.querySelector('.nav-links a[href="/speaking.html"]');
        if (speakingLink) speakingLink.classList.add('active');
      });
  </script>

  <!-- ✅ 原有逻辑（保留） -->
  <script>
    const container = document.getElementById("topic-list");

    interviewData.forEach(item => {
      const card = document.createElement("div");
      card.className = "card card-item";

      card.innerHTML = `
        <h3>${item.topic}</h3>
        <button onclick="openInterview(${item.id})">Start</button>
      `;

      container.appendChild(card);
    });

    function openInterview(id) {
      window.location.href = `/interview-detail.html?id=${id}`;
    }
  </script>

</body>
</html>
