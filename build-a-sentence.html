<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build a Sentence</title>
  <link rel="stylesheet" href="build-a-sentence.css" />
</head>
<body>
  <div class="container">
    <h1>Make an appropriate sentence.</h1>

    <div class="question-card">
      <div class="speaker-row">
        <div class="avatar"></div>
        <div id="speakerA" class="speech"></div>
      </div>

      <div class="speaker-row">
        <div class="avatar"></div>
        <div class="response-area">
          <span id="prefixText"></span>
          <div id="slotsContainer" class="slots-inline"></div>
          <span id="suffixText"></span>
        </div>
      </div>
    </div>

    <div id="bank" class="bank"></div>

    <div class="controls">
      <button id="checkBtn">Check</button>
      <button id="resetBtn">Reset</button>
      <button id="nextBtn">Next</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script src="build-a-sentence-questions.js"></script>
  <script src="build-a-sentence.js"></script>
</body>
</html>
