<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading</title>
  <link rel="stylesheet" href="/styles.css?v=reading-clean1"/>
</head>

<body>

<div id="navbar"></div>

<div class="page-simple">

  <h1>Reading</h1>

  <p class="page-desc">
    Select a question type to begin your practice.
  </p>

  <div class="section-list">

    <a href="complete-the-words.html" class="section-item">
      <span class="section-title">Complete the Words</span>
      <span class="section-sub">Train grammar, collocation, and context prediction.</span>
    </a>

    <a href="reading.html#daily" class="section-item">
      <span class="section-title">Read in Daily Life</span>
      <span class="section-sub">Practice scanning and real-life reading skills.</span>
    </a>

    <a href="read-an-academic-passage.html" class="section-item">
      <span class="section-title">Read an Academic Passage</span>
      <span class="section-sub">Improve academic reading and comprehension.</span>
    </a>

  </div>

</div>

<script>
  fetch('/navbar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('navbar').innerHTML = html;

      document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
      const link = document.querySelector('[data-page="reading"]');
      if(link) link.classList.add('active');
    });
</script>

</body>
</html>
