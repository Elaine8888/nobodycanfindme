<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Read an Academic Passage Practice</title>
  <link rel="stylesheet" href="/styles.css?v=20260331navfinal1" />
  <style>
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #2563eb;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin: 10px 0 26px;
    }

    .layout {
      display: flex;
      gap: 36px;
      align-items: flex-start;
    }

    .passage-card,
    .question-card,
    .result-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 28px;
      border: 1px solid var(--line);
    }

    .passage-card {
      flex: 1.05;
      min-width: 0;
    }

    .question-card,
    .result-card {
      flex: 0.95;
      min-width: 320px;
      position: sticky;
      top: 96px;
    }

    .passage-text {
      font-size: 1.06rem;
      line-height: 1.8;
      white-space: pre-line;
    }

    .passage-paragraph {
      margin-bottom: 1.2em;
    }

    .passage-paragraph:last-child {
      margin-bottom: 0;
    }

    .target-paragraph {
      background: #f8fbff;
      border-left: 4px solid #2563eb;
      padding: 12px 14px;
      border-radius: 8px;
    }

    .passage-meta {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .highlight-word {
      background: #0f766e;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .progress {
      font-size: 0.96rem;
      color: #475569;
      font-weight: 600;
      margin-top: 4px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 1.3rem;
      line-height: 1.5;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .options {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      display: block;
      border: 1.5px solid #dbe2ea;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.18s ease;
      background: #fff;
      line-height: 1.5;
    }

    .option:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .option input {
      margin-right: 10px;
      transform: translateY(1px);
    }

    .sentence-select-list {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .sentence-option {
      padding: 14px 16px;
      border: 1.5px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      line-height: 1.7;
      transition: all 0.18s ease;
    }

    .sentence-option:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .sentence-option.active {
      border-color: #2563eb;
      background: #eef4ff;
      font-weight: 700;
    }

    .sentence-number {
      display: inline-block;
      min-width: 26px;
      font-weight: 800;
      color: #2563eb;
      margin-right: 6px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .primary-btn {
      background: #2563eb;
      color: #fff;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary-btn:hover {
      background: #cbd5e1;
    }

    .secondary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .muted {
      color: #64748b;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .score {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .accuracy {
      font-size: 1.1rem;
      color: #334155;
      margin-bottom: 22px;
      font-weight: 600;
    }

    .review-list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .review-item {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      background: #fcfdff;
    }

    .review-item.correct {
      border-left: 6px solid #16a34a;
    }

    .review-item.wrong {
      border-left: 6px solid #dc2626;
    }

    .review-q {
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .review-line {
      margin: 4px 0;
      line-height: 1.5;
    }

    .review-line strong {
      color: #0f172a;
    }

    .explanation {
      margin-top: 10px;
      line-height: 1.7;
      color: #334155;
    }

    .result-actions {
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    .insert-slot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #00796b;
      margin: 0 6px;
      border-radius: 2px;
      cursor: pointer;
      vertical-align: middle;
    }

    .insert-slot:hover {
      background-color: #00695c;
    }

    .insert-slot.selected {
      background-color: #005f56;
    }

    .inserted-sentence {
      display: inline;
      background: #eefcfb;
      border: 2px solid #8dd9dd;
      border-radius: 8px;
      padding: 2px 6px;
      font-weight: 700;
      white-space: normal;
    }

    .insert-choice-list {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .insert-choice-item {
      padding: 12px 14px;
      border: 1.5px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      color: #334155;
      font-weight: 600;
    }

    .insert-choice-item.active {
      border-color: #0f9ea8;
      background: #eefcfb;
      color: #0a6f78;
    }

    .insert-sentence-box {
      margin: 18px 0 20px;
      padding: 16px 18px;
      border: 1.5px solid #dbe2ea;
      border-radius: 14px;
      background: #fff;
      color: #334155;
      line-height: 1.7;
      font-size: 1.04rem;
    }

    .insert-sentence-box strong {
      display: block;
      margin-bottom: 8px;
      color: #0f172a;
      font-size: 0.98rem;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .question-card,
      .result-card {
        position: static;
        width: 100%;
        min-width: 0;
      }

      .title {
        font-size: 1.7rem;
      }

      .question-text {
        font-size: 1.12rem;
      }

      .question-top {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-buttons {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="page">
      <div class="topbar">
        <a class="back-link" href="/read-an-academic-passage.html">← Back to Passage List</a>
      </div>

      <div class="title" id="passageTitle"></div>

      <div class="layout">
        <section class="passage-card">
          <div class="passage-meta" id="passageMeta"></div>
          <div class="passage-text" id="passage"></div>
        </section>

        <section class="question-card" id="questionCard">
          <div class="question-top">
            <div class="progress" id="progress"></div>
            <div class="nav-buttons">
              <button class="secondary-btn" id="backBtn">Back</button>
              <button class="primary-btn" id="nextBtn">Next</button>
            </div>
          </div>

          <div class="question-text" id="questionText"></div>
          <div id="insertSentenceBox" class="insert-sentence-box" style="display:none;"></div>
          <div class="options" id="options"></div>
          <div class="muted" id="hintText">You can move on even if you leave a question unanswered.</div>
        </section>

        <section class="result-card hidden" id="resultCard">
          <div class="score" id="scoreText"></div>
          <div class="accuracy" id="accuracyText"></div>
          <div class="result-actions">
            <a class="back-link" href="/read-an-academic-passage.html">← Back to Passage List</a>
          </div>
          <div class="review-list" id="reviewList"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
        const readingLink = document.querySelector('.nav-links a[href="/reading.html"]');
        if (readingLink) readingLink.classList.add('active');
      });
  </script>

  <script src="/read-an-academic-passage-questions.js"></script>

  <script>
    const passages = window.academicPassages || {};

    const params = new URLSearchParams(window.location.search);
    const passageId = params.get("id") || "2";
    const currentPassage = passages[passageId] || passages["2"];

    const passageTitleEl = document.getElementById("passageTitle");
    const passageMetaEl = document.getElementById("passageMeta");
    const passageEl = document.getElementById("passage");
    const progressEl = document.getElementById("progress");
    const questionTextEl = document.getElementById("questionText");
    const insertSentenceBoxEl = document.getElementById("insertSentenceBox");
    const optionsEl = document.getElementById("options");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const questionCard = document.getElementById("questionCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const accuracyText = document.getElementById("accuracyText");
    const reviewList = document.getElementById("reviewList");
    const hintText = document.getElementById("hintText");

    let currentIndex = 0;
    let userAnswers = currentPassage ? new Array(currentPassage.questions.length).fill(null) : [];

    function formatDate(dateValue) {
      if (!dateValue) return "";
      if (Array.isArray(dateValue)) return dateValue.join(" / ");
      return dateValue;
    }

    function getPlainPassageText() {
      if (currentPassage.plainPassage) return currentPassage.plainPassage;
      if (Array.isArray(currentPassage.passage)) return currentPassage.passage.join("\n\n");
      return "";
    }

    function getParagraphsFromPassage() {
      if (Array.isArray(currentPassage.passage)) {
        return currentPassage.passage;
      }
      return getPlainPassageText()
        .split(/\n\s*\n/)
        .map(p => p.trim())
        .filter(Boolean);
    }

    function stripSlots(text) {
      return (text || "")
        .replace(/\[SLOT_A\]/g, "")
        .replace(/\[SLOT_B\]/g, "")
        .replace(/\[SLOT_C\]/g, "")
        .replace(/\[SLOT_D\]/g, "")
        .replace(/\[A\]/g, "")
        .replace(/\[B\]/g, "")
        .replace(/\[C\]/g, "")
        .replace(/\[D\]/g, "")
        .replace(/■/g, "");
    }

    function splitParagraphIntoSentences(paragraphText) {
      if (!paragraphText) return [];
      const cleaned = paragraphText.replace(/\s+/g, " ").trim();
      const matches = cleaned.match(/[^.!?]+[.!?]+(?:["')\]]+)?|[^.!?]+$/g);
      return (matches || []).map(s => s.trim()).filter(Boolean);
    }

    function isInsertionQuestion(q) {
      return !!(q && (q.type === "insertion" || q.passageWithSlots || q.insertSentence));
    }

    function isSentenceSelectQuestion(q) {
      return !!(q && q.type === "sentence_select");
    }

    function normalizeInsertionAnswer(answer) {
      if (typeof answer === "string") return answer.toUpperCase();
      const map = ["A", "B", "C", "D"];
      return map[answer] || null;
    }

    function getSentenceSelectSentences(question) {
      const paragraphs = getParagraphsFromPassage();
      const targetParagraph = paragraphs[question.paragraphIndex] || "";
      return splitParagraphIntoSentences(targetParagraph);
    }

    function renderParagraphs(paragraphs, highlightedIndex = null) {
      passageEl.innerHTML = paragraphs.map((p, idx) => {
        const className = idx === highlightedIndex
          ? "passage-paragraph target-paragraph"
          : "passage-paragraph";
        return `<div class="${className}">${p}</div>`;
      }).join("");
    }

    function getSelectedAnswer() {
      const q = currentPassage.questions[currentIndex];
      if (isInsertionQuestion(q) || isSentenceSelectQuestion(q)) {
        return userAnswers[currentIndex];
      }
      const selected = document.querySelector('input[name="question"]:checked');
      return selected ? Number(selected.value) : null;
    }

    function saveCurrentAnswer() {
      const q = currentPassage.questions[currentIndex];
      if (!isInsertionQuestion(q) && !isSentenceSelectQuestion(q)) {
        userAnswers[currentIndex] = getSelectedAnswer();
      }
    }

    function renderSentenceSelectQuestion(q) {
      const sentences = getSentenceSelectSentences(q);
      const selectedIndex = userAnswers[currentIndex];

      optionsEl.innerHTML = `
        <div class="sentence-select-list">
          ${sentences.map((sentence, idx) => `
            <div class="sentence-option ${selectedIndex === idx ? 'active' : ''}" data-index="${idx}">
              <span class="sentence-number">${idx + 1}.</span>${sentence}
            </div>
          `).join('')}
        </div>
      `;

      document.querySelectorAll('.sentence-option').forEach(el => {
        el.addEventListener('click', () => {
          userAnswers[currentIndex] = Number(el.dataset.index);
          renderSentenceSelectQuestion(q);
        });
      });
    }

    function renderPassageForCurrentQuestion() {
      const q = currentPassage.questions[currentIndex];

      if (isInsertionQuestion(q)) {
        renderInsertionPassage(q, userAnswers[currentIndex]);
        return;
      }

      if (isSentenceSelectQuestion(q)) {
        const paragraphs = getParagraphsFromPassage().map(p => stripSlots(p));
        renderParagraphs(paragraphs, q.paragraphIndex);
        return;
      }

      if (currentPassage.highlightQuestionIndex === currentIndex && currentPassage.highlightedPassage) {
        passageEl.innerHTML = stripSlots(currentPassage.highlightedPassage);
      } else {
        const plainText = stripSlots(getPlainPassageText());
        passageEl.textContent = plainText;
      }
    }

      function renderInsertionPassage(q, selectedLetter = null) {
  const slotOrder = ["A", "B", "C", "D"];
  let slotIndex = 0;

  let html = (q.passageWithSlots || "").replace(
    /\[SLOT_[A-D]\]|\[[A-D]\]|■/g,
    () => {
      const letter = slotOrder[slotIndex] || "A";
      slotIndex++;
      return `<span class="insert-slot" data-slot="${letter}" aria-label="Position ${letter}"></span>`;
    }
  );

  passageEl.innerHTML = html;

  const slots = passageEl.querySelectorAll(".insert-slot");

  slots.forEach(slot => {
    const slotLetter = slot.dataset.slot;

    if (selectedLetter && slotLetter === selectedLetter) {
      slot.classList.add("selected");
      const inserted = document.createElement("span");
      inserted.className = "inserted-sentence";
      inserted.textContent = q.insertSentence;
      slot.insertAdjacentElement("afterend", inserted);
    }

    slot.addEventListener("click", () => {
      userAnswers[currentIndex] = slotLetter;
      renderInsertionPassage(q, slotLetter);
      renderInsertionChoices(slotLetter);
    });
  });
}

      passageEl.innerHTML = html;

      const slots = passageEl.querySelectorAll('.insert-slot');

      slots.forEach(slot => {
        const slotLetter = slot.dataset.slot;

        if (selectedLetter && slotLetter === selectedLetter) {
          slot.classList.add('selected');
          const inserted = document.createElement('span');
          inserted.className = 'inserted-sentence';
          inserted.textContent = q.insertSentence;
          slot.insertAdjacentElement('afterend', inserted);
        }

        slot.addEventListener('click', () => {
          userAnswers[currentIndex] = slotLetter;
          renderInsertionPassage(q, slotLetter);
          renderInsertionChoices(slotLetter);
        });
      });
    }

    function renderInsertionChoices(selectedLetter = null) {
      const choices = ["A", "B", "C", "D"];
      optionsEl.innerHTML = `
        <div class="insert-choice-list">
          ${choices.map(letter => `
            <div class="insert-choice-item ${selectedLetter === letter ? 'active' : ''}">
              Position ${letter}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderQuestion() {
      const q = currentPassage.questions[currentIndex];
      progressEl.textContent = `Question ${currentIndex + 1} of ${currentPassage.questions.length}`;
      questionTextEl.textContent = q.question;

      if (isInsertionQuestion(q)) {
        insertSentenceBoxEl.style.display = "block";
        insertSentenceBoxEl.innerHTML = `
          <strong>Sentence to insert</strong>
          ${q.insertSentence}
        `;
        renderInsertionChoices(userAnswers[currentIndex]);
        hintText.textContent = "Click one of the four squares in the passage to place the sentence.";
      } else if (isSentenceSelectQuestion(q)) {
        insertSentenceBoxEl.style.display = "none";
        insertSentenceBoxEl.innerHTML = "";
        renderSentenceSelectQuestion(q);
        hintText.textContent = "Click the sentence in the specified paragraph that best answers the question.";
      } else {
        insertSentenceBoxEl.style.display = "none";
        insertSentenceBoxEl.innerHTML = "";
        optionsEl.innerHTML = "";
        q.options.forEach((option, idx) => {
          const optionId = `q${currentIndex}_opt${idx}`;
          const checked = userAnswers[currentIndex] === idx ? "checked" : "";
          optionsEl.innerHTML += `
            <label class="option" for="${optionId}">
              <input type="radio" id="${optionId}" name="question" value="${idx}" ${checked}>
              ${option}
            </label>
          `;
        });
        hintText.textContent = "You can move on even if you leave a question unanswered.";
      }

      backBtn.disabled = currentIndex === 0;
      nextBtn.textContent = currentIndex === currentPassage.questions.length - 1 ? "Finish" : "Next";

      renderPassageForCurrentQuestion();
    }

    function isAnswerCorrect(question, userAnswer) {
      if (isInsertionQuestion(question)) {
        return userAnswer === normalizeInsertionAnswer(question.answer);
      }
      if (isSentenceSelectQuestion(question)) {
        return userAnswer === question.answer;
      }
      return userAnswer === question.answer;
    }

    function formatUserAnswer(question, userAnswer) {
      if (userAnswer === null || userAnswer === undefined) return "No answer";

      if (isInsertionQuestion(question)) {
        return userAnswer;
      }

      if (isSentenceSelectQuestion(question)) {
        const sentences = getSentenceSelectSentences(question);
        return sentences[userAnswer] || "No answer";
      }

      return question.options[userAnswer];
    }

    function formatCorrectAnswer(question) {
      if (isInsertionQuestion(question)) {
        return normalizeInsertionAnswer(question.answer);
      }

      if (isSentenceSelectQuestion(question)) {
        const sentences = getSentenceSelectSentences(question);
        return sentences[question.answer] || "";
      }

      return question.options[question.answer];
    }

    function showResults() {
      let correctCount = 0;
      reviewList.innerHTML = "";

      currentPassage.questions.forEach((q, idx) => {
        const isCorrect = isAnswerCorrect(q, userAnswers[idx]);
        if (isCorrect) correctCount++;

        const reviewItem = document.createElement("div");
        reviewItem.className = `review-item ${isCorrect ? "correct" : "wrong"}`;

        reviewItem.innerHTML = `
          <div class="review-q">${q.question}</div>
          <div class="review-line"><strong>Your answer:</strong> ${formatUserAnswer(q, userAnswers[idx])}</div>
          <div class="review-line"><strong>Correct answer:</strong> ${formatCorrectAnswer(q)}</div>
          <div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>
        `;

        reviewList.appendChild(reviewItem);
      });

      const total = currentPassage.questions.length;
      const accuracy = Math.round((correctCount / total) * 100);

      scoreText.textContent = `Score: ${correctCount} / ${total}`;
      accuracyText.textContent = `Accuracy: ${accuracy}%`;

      questionCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      insertSentenceBoxEl.style.display = "none";
      insertSentenceBoxEl.innerHTML = "";
      passageEl.textContent = stripSlots(getPlainPassageText());
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    nextBtn.addEventListener("click", () => {
      saveCurrentAnswer();

      if (currentIndex < currentPassage.questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    });

    backBtn.addEventListener("click", () => {
      saveCurrentAnswer();

      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    if (!currentPassage) {
      passageTitleEl.textContent = "Passage not found";
      passageMetaEl.textContent = "";
      passageEl.textContent = "The requested passage could not be loaded.";
      questionCard.classList.add("hidden");
    } else {
      passageTitleEl.textContent = currentPassage.title;
      const formattedDate = formatDate(currentPassage.date);
      passageMetaEl.textContent = formattedDate
        ? `Test Date: ${formattedDate} · Passage #${currentPassage.id}`
        : `Passage #${currentPassage.id}`;
      renderQuestion();
    }
  </script>
</body>
</html>
