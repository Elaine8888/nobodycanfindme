<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Read an Academic Passage Practice</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .page {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #2563eb;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin: 10px 0 26px;
    }

    .layout {
      display: flex;
      gap: 36px;
      align-items: flex-start;
    }

    .passage-card,
    .question-card,
    .result-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    .passage-card {
      flex: 1.05;
      min-width: 0;
    }

    .question-card,
    .result-card {
      flex: 0.95;
      min-width: 320px;
      position: sticky;
      top: 20px;
    }

    .passage-text {
      font-size: 1.06rem;
      line-height: 1.8;
      white-space: pre-line;
    }

    .highlight-word {
      background: #0f766e;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .progress {
      font-size: 0.96rem;
      color: #475569;
      font-weight: 600;
      margin-top: 4px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 1.3rem;
      line-height: 1.5;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .options {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      display: block;
      border: 1.5px solid #dbe2ea;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.18s ease;
      background: #fff;
      line-height: 1.5;
    }

    .option:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .option input {
      margin-right: 10px;
      transform: translateY(1px);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .primary-btn {
      background: #2563eb;
      color: #fff;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary-btn:hover {
      background: #cbd5e1;
    }

    .secondary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .muted {
      color: #64748b;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .score {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .accuracy {
      font-size: 1.1rem;
      color: #334155;
      margin-bottom: 22px;
      font-weight: 600;
    }

    .review-list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .review-item {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      background: #fcfdff;
    }

    .review-item.correct {
      border-left: 6px solid #16a34a;
    }

    .review-item.wrong {
      border-left: 6px solid #dc2626;
    }

    .review-q {
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .review-line {
      margin: 4px 0;
      line-height: 1.5;
    }

    .review-line strong {
      color: #0f172a;
    }

    .explanation {
      margin-top: 10px;
      line-height: 1.7;
      color: #334155;
    }

    .result-actions {
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    /* ===== 通用句子插入题插件样式 ===== */
    .insert-slot {
      display: inline-flex;
      width: 24px;
      height: 24px;
      align-items: center;
      justify-content: center;
      margin: 0 4px;
      border-radius: 6px;
      background: #0f9ea8;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      vertical-align: middle;
      box-shadow: 0 2px 8px rgba(15, 158, 168, 0.25);
      transition: transform .15s ease, background .15s ease;
      white-space: normal;
    }

    .insert-slot:hover {
      background: #0c8590;
      transform: translateY(-1px);
    }

    .insert-slot.selected {
      background: #0a6f78;
      outline: 2px solid #b9f0f3;
    }

    .inserted-sentence {
      display: inline;
      background: #eefcfb;
      border: 2px solid #8dd9dd;
      border-radius: 8px;
      padding: 2px 6px;
      font-weight: 700;
      white-space: normal;
    }

    .insert-choice-list {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .insert-choice-item {
      padding: 12px 14px;
      border: 1.5px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      color: #334155;
      font-weight: 600;
    }

    .insert-choice-item.active {
      border-color: #0f9ea8;
      background: #eefcfb;
      color: #0a6f78;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .question-card,
      .result-card {
        position: static;
        width: 100%;
        min-width: 0;
      }

      .title {
        font-size: 1.7rem;
      }

      .question-text {
        font-size: 1.12rem;
      }

      .question-top {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-buttons {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="back-link" href="read-an-academic-passage.html">← Back to Passage List</a>
    </div>

    <div class="title" id="passageTitle"></div>

    <div class="layout">
      <section class="passage-card">
        <div class="passage-text" id="passage"></div>
      </section>

      <section class="question-card" id="questionCard">
        <div class="question-top">
          <div class="progress" id="progress"></div>
          <div class="nav-buttons">
            <button class="secondary-btn" id="backBtn">Back</button>
            <button class="primary-btn" id="nextBtn">Next</button>
          </div>
        </div>

        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="muted" id="hintText">You can move on even if you leave a question unanswered.</div>
      </section>

      <section class="result-card hidden" id="resultCard">
        <div class="score" id="scoreText"></div>
        <div class="accuracy" id="accuracyText"></div>
        <div class="result-actions">
          <a class="back-link" href="read-an-academic-passage.html">← Back to Passage List</a>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>
    </div>
  </div>

  <script>
    /*
      ===== 通用句子插入题插件使用说明 =====

      在 questions 里新增题目时，使用这种结构：

      {
        type: "insertion",
        question: "There are four locations [■] in the passage ...",
        passageWithSlots: "Sentence one. [A] Sentence two. [B] Sentence three. [C] Sentence four. [D]",
        insertSentence: "Additionally, green roofs require ongoing maintenance to ensure proper drainage, plant health, and structural integrity.",
        answer: "C",
        explanation: "This sentence introduces a drawback/requirement, so it fits before the sentence about cost and then leads naturally to incentives."
      }

      说明：
      - answer 用 "A" / "B" / "C" / "D"
      - [A][B][C][D] 是通用占位符
      - 点击方框后，句子会自动插入到对应位置
      - 最终核对答案时，也按 A/B/C/D 检查
    */

    const passages = {
      1: {
        title: "The Dynamics of Hollywood’s Golden Age",
        plainPassage: `Hollywood's Golden Age, from the 1920s to the 1960s, was a transformative period in cinema history. Under the studio system, major companies like RKO controlled film production, creating an efficient assembly-line process that produced stars such as Humphrey Bogart and Katharine Hepburn. While this system ensured a steady output of films, it often limited creative freedom for directors and actors tied to restrictive contracts. Yet this very constraint led to unexpected innovation as filmmakers sought new ways to tell compelling stories within set boundaries.

A pivotal change during this era was the introduction of sound, forever altering cinematic storytelling. Silent film stars had to adapt or risk obsolescence, while new genres like musicals capitalized on sound technology's possibilities. This shift pushed directors to experiment with narrative structures, often blurring the lines between genres to captivate audiences.

The decline of the studio system began with a 1948 Supreme Court ruling that dismantled studios' monopolies over theaters. This ruling opened the door for independent filmmakers, whose diverse and unconventional stories began gaining traction in theaters. However, the legacy of the studio system's efficiency and star-making machinery still influences Hollywood's operations today.`,
        highlightedPassage: `Hollywood's Golden Age, from the 1920s to the 1960s, was a transformative period in cinema history. Under the studio system, major companies like RKO controlled film production, creating an efficient assembly-line process that produced stars such as Humphrey Bogart and Katharine Hepburn. While this system ensured a steady output of films, it often limited creative freedom for directors and actors tied to restrictive contracts. Yet this very constraint led to unexpected innovation as filmmakers sought new ways to tell <span class="highlight-word">compelling</span> stories within set boundaries.

A pivotal change during this era was the introduction of sound, forever altering cinematic storytelling. Silent film stars had to adapt or risk obsolescence, while new genres like musicals capitalized on sound technology's possibilities. This shift pushed directors to experiment with narrative structures, often blurring the lines between genres to captivate audiences.

The decline of the studio system began with a 1948 Supreme Court ruling that dismantled studios' monopolies over theaters. This ruling opened the door for independent filmmakers, whose diverse and unconventional stories began gaining traction in theaters. However, the legacy of the studio system's efficiency and star-making machinery still influences Hollywood's operations today.`,
        questions: [
          {
            question: "1. Which aspect of the studio system encouraged filmmakers to innovate?",
            options: [
              "The demand for more silent films",
              "The freedom to create experimental films",
              "The inefficiency of film production",
              "The boundaries imposed by restrictive contracts"
            ],
            answer: 3,
            explanation: "The key clue is that the passage says the constraint itself led to unexpected innovation. So the restriction, not freedom, pushed filmmakers to innovate."
          },
          {
            question: "2. The word “compelling” in the passage is closest in meaning to",
            options: [
              "modern",
              "astonishing",
              "fascinating",
              "complex"
            ],
            answer: 2,
            explanation: "Here compelling means interesting or engaging enough to hold attention, so fascinating is the closest match."
          },
          {
            question: "3. Why does the author mention the introduction of sound in films?",
            options: [
              "To highlight a development that led to new, creative narrative techniques",
              "To emphasize the former popularity of silent films",
              "To discuss how sound renewed the careers of silent film stars",
              "To identify the event that started the decline of the studio system"
            ],
            answer: 0,
            explanation: "The passage says sound pushed directors to experiment with narrative structures, so it is presented as a creative turning point."
          },
          {
            question: "4. What inference can be made about the 1948 Supreme Court ruling?",
            options: [
              "It led to a temporary increase in studio profits.",
              "It allowed independent films to be seen and become popular.",
              "It caused studios to develop more large-scale musical productions.",
              "It had no effect on Hollywood's operations."
            ],
            answer: 1,
            explanation: "The ruling opened the door for independent filmmakers and their stories began gaining traction, so it helped independent films reach audiences."
          },
          {
            question: "5. What does the passage imply about the Hollywood film industry today?",
            options: [
              "Modern studios have completely abandoned all practices from the Golden Age period.",
              "Contemporary films commonly use the storytelling techniques developed during the 1920s–1960s.",
              "Independent filmmakers have entirely replaced the studio system’s influence on cinema.",
              "The assembly-line process of the studio system still impacts current Hollywood operations."
            ],
            answer: 3,
            explanation: "The last sentence states that the legacy of the studio system still influences Hollywood's operations today."
          }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const passageId = params.get("id") || "1";
    const currentPassage = passages[passageId] || passages["1"];

    const passageTitleEl = document.getElementById("passageTitle");
    const passageEl = document.getElementById("passage");
    const progressEl = document.getElementById("progress");
    const questionTextEl = document.getElementById("questionText");
    const optionsEl = document.getElementById("options");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const questionCard = document.getElementById("questionCard");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const accuracyText = document.getElementById("accuracyText");
    const reviewList = document.getElementById("reviewList");
    const hintText = document.getElementById("hintText");

    let currentIndex = 0;
    let userAnswers = new Array(currentPassage.questions.length).fill(null);

    passageTitleEl.textContent = currentPassage.title;

    function isInsertionQuestion(q) {
      return q && q.type === "insertion";
    }

    function getSelectedAnswer() {
      const q = currentPassage.questions[currentIndex];
      if (isInsertionQuestion(q)) {
        return userAnswers[currentIndex];
      }
      const selected = document.querySelector('input[name="question"]:checked');
      return selected ? Number(selected.value) : null;
    }

    function saveCurrentAnswer() {
      const q = currentPassage.questions[currentIndex];
      if (!isInsertionQuestion(q)) {
        userAnswers[currentIndex] = getSelectedAnswer();
      }
    }

    function renderPassageForCurrentQuestion() {
      const q = currentPassage.questions[currentIndex];

      if (isInsertionQuestion(q)) {
        renderInsertionPassage(q, userAnswers[currentIndex]);
        return;
      }

      if (currentIndex === 1 && currentPassage.highlightedPassage) {
        passageEl.innerHTML = currentPassage.highlightedPassage;
      } else {
        passageEl.textContent = currentPassage.plainPassage;
      }
    }

    function renderInsertionPassage(q, selectedLetter = null) {
      let html = q.passageWithSlots
        .replace(/\[A\]/g, '<span class="insert-slot" data-slot="A">■</span>')
        .replace(/\[B\]/g, '<span class="insert-slot" data-slot="B">■</span>')
        .replace(/\[C\]/g, '<span class="insert-slot" data-slot="C">■</span>')
        .replace(/\[D\]/g, '<span class="insert-slot" data-slot="D">■</span>');

      passageEl.innerHTML = html;

      const slots = passageEl.querySelectorAll('.insert-slot');

      slots.forEach(slot => {
        const slotLetter = slot.dataset.slot;

        if (selectedLetter && slotLetter === selectedLetter) {
          slot.classList.add('selected');
          const inserted = document.createElement('span');
          inserted.className = 'inserted-sentence';
          inserted.textContent = q.insertSentence;
          slot.insertAdjacentElement('afterend', inserted);
        }

        slot.addEventListener('click', () => {
          userAnswers[currentIndex] = slotLetter;
          renderInsertionPassage(q, slotLetter);
          renderInsertionChoices(slotLetter);
        });
      });
    }

    function renderInsertionChoices(selectedLetter = null) {
      const choices = ["A", "B", "C", "D"];
      optionsEl.innerHTML = `
        <div class="insert-choice-list">
          ${choices.map(letter => `
            <div class="insert-choice-item ${selectedLetter === letter ? 'active' : ''}">
              Position ${letter}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderQuestion() {
      const q = currentPassage.questions[currentIndex];
      progressEl.textContent = `Question ${currentIndex + 1} of ${currentPassage.questions.length}`;
      questionTextEl.textContent = q.question;

      if (isInsertionQuestion(q)) {
        renderInsertionChoices(userAnswers[currentIndex]);
        hintText.textContent = "Click one of the four squares in the passage to place the sentence.";
      } else {
        optionsEl.innerHTML = "";
        q.options.forEach((option, idx) => {
          const optionId = `q${currentIndex}_opt${idx}`;
          const checked = userAnswers[currentIndex] === idx ? "checked" : "";
          optionsEl.innerHTML += `
            <label class="option" for="${optionId}">
              <input type="radio" id="${optionId}" name="question" value="${idx}" ${checked}>
              ${option}
            </label>
          `;
        });
        hintText.textContent = "You can move on even if you leave a question unanswered.";
      }

      backBtn.disabled = currentIndex === 0;
      nextBtn.textContent = currentIndex === currentPassage.questions.length - 1 ? "Finish" : "Next";

      renderPassageForCurrentQuestion();
    }

    function isAnswerCorrect(question, userAnswer) {
      if (isInsertionQuestion(question)) {
        return userAnswer === question.answer;
      }
      return userAnswer === question.answer;
    }

    function showResults() {
      let correctCount = 0;
      reviewList.innerHTML = "";

      currentPassage.questions.forEach((q, idx) => {
        const isCorrect = isAnswerCorrect(q, userAnswers[idx]);
        if (isCorrect) correctCount++;

        const userAnswerText = (() => {
          if (userAnswers[idx] === null) return "No answer";
          if (isInsertionQuestion(q)) return userAnswers[idx];
          return q.options[userAnswers[idx]];
        })();

        const correctAnswerText = isInsertionQuestion(q)
          ? q.answer
          : q.options[q.answer];

        const reviewItem = document.createElement("div");
        reviewItem.className = `review-item ${isCorrect ? "correct" : "wrong"}`;

        reviewItem.innerHTML = `
          <div class="review-q">${q.question}</div>
          <div class="review-line"><strong>Your answer:</strong> ${userAnswerText}</div>
          <div class="review-line"><strong>Correct answer:</strong> ${correctAnswerText}</div>
          <div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>
        `;

        reviewList.appendChild(reviewItem);
      });

      const total = currentPassage.questions.length;
      const accuracy = Math.round((correctCount / total) * 100);

      scoreText.textContent = `Score: ${correctCount} / ${total}`;
      accuracyText.textContent = `Accuracy: ${accuracy}%`;

      questionCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      passageEl.textContent = currentPassage.plainPassage || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    nextBtn.addEventListener("click", () => {
      saveCurrentAnswer();

      if (currentIndex < currentPassage.questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    });

    backBtn.addEventListener("click", () => {
      saveCurrentAnswer();

      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    renderQuestion();
  </script>
</body>
</html>
