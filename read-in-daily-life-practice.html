<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read in Daily Life Practice</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #4b5563;
      font-size: 15px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .nav-links a.active {
      background: #e8f0ff;
      color: #2563eb;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .page-header {
      margin-bottom: 20px;
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .page-header p {
      margin: 0;
      color: #6b7280;
      font-size: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .progress {
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .card-body {
      padding: 22px 20px;
    }

    .passage-box {
      border: 2px solid #d1d5db;
      border-radius: 14px;
      padding: 24px;
      background: #fcfcfc;
      min-height: 420px;
      line-height: 1.85;
      font-size: 18px;
      white-space: pre-wrap;
    }

    .notice-title {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 22px;
      text-align: center;
      color: #111827;
    }

    .notice-text {
      font-size: 18px;
      color: #111827;
    }

    .notice-text .linkish {
      color: #1d4ed8;
      word-break: break-word;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .small-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      background: #eef2f7;
      color: #111827;
    }

    .small-btn:hover {
      background: #e5e7eb;
    }

    .small-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .question-index {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #4338ca;
      background: #eef2ff;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .question-title {
      margin: 0 0 16px;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.6;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
    }

    .option:hover {
      border-color: #c7d2fe;
      background: #f8faff;
    }

    .option input {
      margin-top: 3px;
      transform: scale(1.05);
    }

    .option.correct {
      background: #ecfdf5;
      border-color: #10b981;
    }

    .option.incorrect {
      background: #fef2f2;
      border-color: #ef4444;
    }

    .option.disabled {
      pointer-events: none;
      opacity: 0.96;
    }

    .question-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #eef2f7;
      color: #111827;
    }

    .secondary-btn:hover {
      background: #e5e7eb;
    }

    .result-card {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      display: none;
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #111827;
    }

    .result-line {
      font-size: 15px;
      color: #374151;
      margin: 4px 0;
      font-weight: 600;
    }

    .review-block {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .review-block h4 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #111827;
    }

    .review-answer {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #2563eb;
      line-height: 1.6;
    }

    .review-explanation {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .passage-box {
        min-height: auto;
      }

      .notice-title {
        font-size: 28px;
      }
    }

    @media (max-width: 600px) {
      .page-header h1 {
        font-size: 24px;
      }

      .card-body,
      .card-header {
        padding: 16px;
      }

      .passage-box {
        padding: 18px;
        font-size: 16px;
      }

      .notice-title {
        font-size: 24px;
      }

      .notice-text {
        font-size: 16px;
      }

      .question-title {
        font-size: 16px;
      }

      .nav-inner {
        padding: 12px 14px;
      }

      .nav-links {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-inner">
      <a href="/index.html" class="logo">Hang in There</a>
      <div class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/reading.html" class="active">Reading</a>
        <a href="/listening.html">Listening</a>
        <a href="/speaking.html">Speaking</a>
        <a href="/writing.html">Writing</a>
      </div>
    </div>
  </div>

  <main class="page">
    <div class="page-header">
      <h1>Read in Daily Life Practice</h1>
      <p>Read the passage and answer the questions below.</p>
    </div>

    <div class="topbar">
      <span class="badge">Reading · Daily Life</span>
      <span class="progress" id="progress">Passage 1 · Question 1 of 2</span>
    </div>

    <div class="layout">
      <section class="card">
        <div class="card-header">
          <h2 id="passageTitle">Passage</h2>
        </div>
        <div class="card-body">
          <div id="passageBox" class="passage-box"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Question</h2>
          <div class="nav-buttons">
            <button class="small-btn" id="backBtn" onclick="goBack()">Back</button>
            <button class="small-btn" id="nextBtn" onclick="goNext()">Next</button>
          </div>
        </div>

        <div class="card-body">
          <div id="questionContainer"></div>

          <div class="question-actions">
            <button class="primary-btn" id="submitBtn" onclick="checkAnswers()">Check Answers</button>
            <button class="secondary-btn" onclick="resetAnswers()">Reset</button>
          </div>

          <div id="resultCard" class="result-card"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="daily-life-questions.js"></script>
  <script>
    let currentPassageIndex = 0;
    let currentQuestionIndex = 0;
    const currentPassage = dailyLifePassages[currentPassageIndex];
    let userAnswers = new Array(currentPassage.questions.length).fill(null);
    let hasSubmitted = false;

    function renderPassage(data) {
      document.getElementById("passageTitle").textContent = data.title;

      const bodyHtml = data.passage.replace(
        /www\.[^\s]+/g,
        '<span class="linkish">$&</span>'
      );

      document.getElementById("passageBox").innerHTML = `
        <div class="notice-title">${data.heading}</div>
        <div class="notice-text">${bodyHtml.replace(/\n/g, "<br>")}</div>
      `;
    }

    function renderQuestion() {
      const q = currentPassage.questions[currentQuestionIndex];
      const container = document.getElementById("questionContainer");
      const selectedAnswer = userAnswers[currentQuestionIndex];

      const optionsHtml = q.options.map((option, optIndex) => {
        const optionLetter = String.fromCharCode(65 + optIndex);
        const checked = selectedAnswer === optIndex ? "checked" : "";
        return `
          <label class="option" id="q${currentQuestionIndex}_opt${optIndex}">
            <input type="radio" name="currentQuestion" value="${optIndex}" ${checked} ${hasSubmitted ? "disabled" : ""}>
            <span><strong>${optionLetter}.</strong> ${option}</span>
          </label>
        `;
      }).join("");

      container.innerHTML = `
        <div class="question-index">Question ${currentQuestionIndex + 1} of ${currentPassage.questions.length}</div>
        <p class="question-title">${q.q}</p>
        <div>${optionsHtml}</div>
      `;

      document.querySelectorAll('input[name="currentQuestion"]').forEach(input => {
        input.addEventListener("change", (e) => {
          userAnswers[currentQuestionIndex] = Number(e.target.value);
        });
      });

      updateProgress();
      updateNavButtons();

      if (hasSubmitted) {
        showQuestionReviewState();
      }
    }

    function updateProgress() {
      document.getElementById("progress").textContent =
        `Passage ${currentPassageIndex + 1} · Question ${currentQuestionIndex + 1} of ${currentPassage.questions.length}`;
    }

    function updateNavButtons() {
      document.getElementById("backBtn").disabled = currentQuestionIndex === 0;
      document.getElementById("nextBtn").disabled = currentQuestionIndex === currentPassage.questions.length - 1;
    }

    function goBack() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function goNext() {
      if (currentQuestionIndex < currentPassage.questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function showQuestionReviewState() {
      const q = currentPassage.questions[currentQuestionIndex];
      const userAnswer = userAnswers[currentQuestionIndex];
      const correctAnswer = q.answer;

      document.querySelectorAll(".option").forEach(opt => {
        opt.classList.add("disabled");
      });

      if (userAnswer !== null) {
        if (userAnswer === correctAnswer) {
          document.getElementById(`q${currentQuestionIndex}_opt${userAnswer}`).classList.add("correct");
        } else {
          document.getElementById(`q${currentQuestionIndex}_opt${userAnswer}`).classList.add("incorrect");
          document.getElementById(`q${currentQuestionIndex}_opt${correctAnswer}`).classList.add("correct");
        }
      } else {
        document.getElementById(`q${currentQuestionIndex}_opt${correctAnswer}`).classList.add("correct");
      }
    }

    function checkAnswers() {
      hasSubmitted = true;

      let score = 0;
      let reviewHtml = "";
      const total = currentPassage.questions.length;

      currentPassage.questions.forEach((q, index) => {
        const userAnswer = userAnswers[index];
        const correctAnswer = q.answer;
        const correctLetter = String.fromCharCode(65 + correctAnswer);

        let userAnswerText = "未作答";
        if (userAnswer !== null) {
          const userLetter = String.fromCharCode(65 + userAnswer);
          userAnswerText = `${userLetter}. ${q.options[userAnswer]}`;
        }

        if (userAnswer === correctAnswer) {
          score++;
        }

        reviewHtml += `
          <div class="review-block">
            <h4>第 ${index + 1} 题</h4>
            <div class="review-answer">正确答案：${correctLetter}. ${q.options[correctAnswer]}</div>
            <div class="review-answer" style="color:#6b7280;">你的答案：${userAnswerText}</div>
            <div class="review-explanation">${q.explanation}</div>
          </div>
        `;
      });

      const accuracy = ((score / total) * 100).toFixed(0);

      const resultCard = document.getElementById("resultCard");
      resultCard.style.display = "block";
      resultCard.innerHTML = `
        <div class="result-title">Results</div>
        <div class="result-line">Score: ${score} / ${total}</div>
        <div class="result-line">Accuracy: ${accuracy}%</div>
        ${reviewHtml}
      `;

      document.getElementById("submitBtn").disabled = true;
      document.getElementById("submitBtn").style.opacity = "0.65";
      document.getElementById("submitBtn").style.cursor = "not-allowed";

      renderQuestion();
    }

    function resetAnswers() {
      userAnswers = new Array(currentPassage.questions.length).fill(null);
      currentQuestionIndex = 0;
      hasSubmitted = false;

      const resultCard = document.getElementById("resultCard");
      resultCard.style.display = "none";
      resultCard.innerHTML = "";

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = false;
      submitBtn.style.opacity = "1";
      submitBtn.style.cursor = "pointer";

      renderQuestion();
    }

    renderPassage(currentPassage);
    renderQuestion();
  </script>
</body>
</html>
