<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing</title>
  <link rel="stylesheet" href="/styles.css?v=20260402-writing-tabs-1" />
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="writing-hub">
      <header class="writing-hub-header">
        <h1>写作练习</h1>
        <p>先选择题型，再点击题目进入练习。</p>
      </header>

      <div class="writing-type-row">
        <div class="writing-type-label">题型：</div>

        <div class="writing-type-tabs">
          <button class="writing-type-tab active" data-type="sentence">
            Build a Sentence
          </button>

          <button class="writing-type-tab" data-type="email">
            Write an Email
          </button>

          <button class="writing-type-tab" data-type="discussion">
            Academic Discussion
          </button>
        </div>
      </div>

      <section class="writing-panel">
        <div class="writing-panel-head">
          <h2 id="writingPanelTitle">Build a Sentence</h2>
          <p id="writingPanelDesc">Choose a set to begin your practice.</p>
        </div>

        <div id="writingList" class="writing-list-grid"></div>
      </section>
    </div>
  </div>

  <script>
    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
        const writingLink = document.querySelector('[data-page="writing"]');
        if (writingLink) writingLink.classList.add('active');
      });

    const buildSentenceSets = [
      { id: 1, title: "Build a Sentence Practice", desc: "Drag the words into the correct order." }
    ];

    const academicDiscussionSets = [
      { id: 1, title: "Set 1 — The Driving Force of History" },
      { id: 2, title: "Set 2 — Brand Loyalty and Personalization" },
      { id: 3, title: "Set 3 — Conformity" },
      { id: 4, title: "Set 4 — Corporate Transparency" },
      { id: 5, title: "Set 5 — Project-Based Learning" },
      { id: 6, title: "Set 6 — Customer Feedback" }
    ];

    const panelTitle = document.getElementById('writingPanelTitle');
    const panelDesc = document.getElementById('writingPanelDesc');
    const writingList = document.getElementById('writingList');
    const tabButtons = document.querySelectorAll('.writing-type-tab');

    function createMetaRow(metaItems) {
      return `
        <div class="writing-card-meta">
          ${metaItems.map(item => `<span>${item}</span>`).join('')}
        </div>
      `;
    }

    function renderBuildSentence() {
      panelTitle.textContent = 'Build a Sentence';
      panelDesc.textContent = 'Choose a set to begin your practice.';

      writingList.innerHTML = buildSentenceSets.map(item => `
        <a class="writing-card" href="/build-a-sentence.html">
          ${createMetaRow([`Set ${item.id}`, 'Ready'])}
          <div class="writing-card-title">${item.title}</div>
          <div class="writing-card-sub">${item.desc}</div>
          <div class="writing-card-foot">Click to start</div>
        </a>
      `).join('');
    }

    function renderEmail() {
      panelTitle.textContent = 'Write an Email';
      panelDesc.textContent = 'Email tasks can be added here later.';

      writingList.innerHTML = `
        <div class="writing-empty-card">
          <div class="writing-empty-title">Write an Email</div>
          <div class="writing-empty-text">这个题型的题目页还没接入。后面你把文件发我，我可以继续接成和其他题型一样的列表页。</div>
        </div>
      `;
    }

    function renderDiscussion() {
      panelTitle.textContent = 'Academic Discussion';
      panelDesc.textContent = 'Choose a set to begin your practice.';

      writingList.innerHTML = academicDiscussionSets.map(item => `
        <a class="writing-card" href="/academic-discussion.html?id=${item.id}">
          ${createMetaRow([`Set ${item.id}`, 'Discussion'])}
          <div class="writing-card-title">${item.title}</div>
          <div class="writing-card-sub">Read the question and respond with your own ideas.</div>
          <div class="writing-card-foot">Click to open</div>
        </a>
      `).join('');
    }

    function setActiveTab(type) {
      tabButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });

      if (type === 'sentence') renderBuildSentence();
      if (type === 'email') renderEmail();
      if (type === 'discussion') renderDiscussion();
    }

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveTab(btn.dataset.type);
      });
    });

    setActiveTab('sentence');
  </script>
</body>
</html>
