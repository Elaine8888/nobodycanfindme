<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing</title>
  <link rel="stylesheet" href="/styles.css?v=20260405-writing-discussion-1" />
  <link rel="stylesheet" href="/build-a-sentence.css?v=20260402-bs-sets-1" />
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="writing-hub">
      <header class="writing-hub-header">
        <h1>写作练习</h1>
        <p>先选择题型，再点击题目进入练习。</p>
      </header>

      <div class="writing-type-row">
        <div class="writing-type-label">题型：</div>

        <div class="writing-type-tabs">
          <button class="writing-type-tab active" data-type="sentence">
            Build a Sentence
          </button>

          <button class="writing-type-tab" data-type="email">
            Write an Email
          </button>

          <button class="writing-type-tab" data-type="discussion">
            Academic Discussion
          </button>
        </div>
      </div>

      <section class="writing-panel">
        <div class="writing-panel-head">
          <h2 id="writingPanelTitle">Build a Sentence</h2>
          <p id="writingPanelDesc">Choose a set to begin your practice.</p>
        </div>

        <div id="writingList"></div>
      </section>
    </div>
  </div>

  <script src="/build-a-sentence-questions.js"></script>
  <script src="/write-an-email-questions.js"></script>
  <script src="/academic-discussion-questions.js"></script>

  <script>
    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
        const writingLink = document.querySelector('[data-page="writing"]');
        if (writingLink) writingLink.classList.add('active');
      });

    const panelTitle = document.getElementById('writingPanelTitle');
    const panelDesc = document.getElementById('writingPanelDesc');
    const writingList = document.getElementById('writingList');
    const tabButtons = document.querySelectorAll('.writing-type-tab');

    function createMetaRow(metaItems) {
      return `
        <div class="writing-card-meta">
          ${metaItems.map(item => `<span>${item}</span>`).join('')}
        </div>
      `;
    }

    function renderBuildSentence() {
      panelTitle.textContent = 'Build a Sentence';
      panelDesc.textContent = 'Each set contains 10 questions.';

      const status = JSON.parse(localStorage.getItem("bs_status") || "{}");
      const questions = window.buildSentenceQuestions || [];

      const setMap = {};
      questions.forEach(q => {
        if (!setMap[q.set]) setMap[q.set] = [];
        setMap[q.set].push(q);
      });

      const sortedSetIds = Object.keys(setMap)
        .map(Number)
        .sort((a, b) => a - b);

      writingList.innerHTML = `
        <div class="bs-set-list">
          ${sortedSetIds.map(setId => {
            const setQuestions = setMap[setId].sort((a, b) => a.id - b.id);

            let correctCount = 0;
            setQuestions.forEach(q => {
              const key = `${q.set}-${q.id}`;
              if (status[key] === "correct") correctCount++;
            });

            return `
              <div class="bs-set-row">
                <div class="bs-set-title">Set ${setId}</div>

                <div class="bs-grid">
                  ${setQuestions.map(q => {
                    const key = `${q.set}-${q.id}`;
                    const s = status[key];
                    let cls = "bs-item";

                    if (s === "correct") cls += " correct";
                    else if (s === "wrong") cls += " wrong";

                    return `<a href="/build-a-sentence.html?set=${q.set}&id=${q.id}" class="${cls}">${q.id}</a>`;
                  }).join('')}
                </div>

                <div class="bs-set-score">${correctCount}/${setQuestions.length}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function getEmailDraftMeta(questionId) {
      const draft = localStorage.getItem(`writeEmailDraft_${questionId}`) || '';
      const savedAt = localStorage.getItem(`writeEmailDraftSavedAt_${questionId}`) || '';
      const wordCount = draft.trim() ? draft.trim().split(/\s+/).length : 0;

      return {
        hasDraft: draft.trim().length > 0,
        savedAt,
        wordCount
      };
    }

    function getDiscussionDraftMeta(questionId) {
      const draft = localStorage.getItem(`academicDiscussionDraft_${questionId}`) || '';
      const savedAt = localStorage.getItem(`academicDiscussionDraftSavedAt_${questionId}`) || '';
      const wordCount = draft.trim() ? draft.trim().split(/\s+/).length : 0;

      return {
        hasDraft: draft.trim().length > 0,
        savedAt,
        wordCount
      };
    }

    function formatSavedAt(value) {
      if (!value) return 'No draft';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Draft saved';
      return `Saved ${date.toLocaleString()}`;
    }

    function renderEmail() {
      panelTitle.textContent = 'Write an Email';
      panelDesc.textContent = 'Open a prompt and save your response locally on this device.';

      const questions = window.writeEmailQuestions || [];

      writingList.innerHTML = `
        <div class="email-list-grid">
          ${questions.map(item => {
            const meta = getEmailDraftMeta(item.id);

            return `
              <a class="email-card" href="/write-an-email-practice.html?id=${item.id}">
                <div class="email-card-top">
                  <span class="email-card-tag">Set ${item.id}</span>
                  <span class="email-card-status ${meta.hasDraft ? 'draft' : 'empty'}">
                    ${meta.hasDraft ? 'Draft saved' : 'New'}
                  </span>
                </div>

                <div class="email-card-title">${item.title}</div>
                <div class="email-card-sub">To: ${item.to}</div>
                <div class="email-card-sub">Subject: ${item.subject}</div>

                <div class="email-card-foot">
                  <span>${formatSavedAt(meta.savedAt)}</span>
                  <span>${meta.wordCount} words</span>
                </div>
              </a>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderDiscussion() {
      panelTitle.textContent = 'Academic Discussion';
      panelDesc.textContent = 'Read the discussion and write your own response.';

      const questions = window.academicDiscussionQuestions || [];

      writingList.innerHTML = `
        <div class="writing-list-grid">
          ${questions.map(item => {
            const meta = getDiscussionDraftMeta(item.id);

            return `
              <a class="writing-card" href="/academic-discussion-practice.html?id=${item.id}">
                ${createMetaRow([`Set ${item.id}`, 'Discussion'])}
                <div class="writing-card-title">${item.title}</div>
                <div class="writing-card-sub">
                  ${item.professorQuestion ? item.professorQuestion.slice(0, 88) + '...' : 'Read the discussion and respond with your own ideas.'}
                </div>
                <div class="writing-card-foot">
                  <span>${meta.hasDraft ? formatSavedAt(meta.savedAt) : 'Click to open'}</span>
                  <span>${meta.wordCount} words</span>
                </div>
              </a>
            `;
          }).join('')}
        </div>
      `;
    }

    function setActiveTab(type) {
      tabButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });

      if (type === 'sentence') renderBuildSentence();
      if (type === 'email') renderEmail();
      if (type === 'discussion') renderDiscussion();
    }

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveTab(btn.dataset.type);
      });
    });

    setActiveTab('sentence');
  </script>
</body>
</html>
