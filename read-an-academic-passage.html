<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read an Academic Passage</title>
  <link rel="stylesheet" href="/styles.css?v=20260331navfinal1" />
  <style>
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .hero-local {
      margin-bottom: 24px;
    }

    .hero-local h1 {
      margin: 0 0 10px;
      font-size: 38px;
      color: var(--text);
    }

    .hero-local p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .passage-list {
      display: grid;
      gap: 16px;
    }

    .passage-card {
      background: white;
      padding: 22px;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: 0.2s;
      border: 1px solid var(--line);
    }

    .passage-card:hover {
      transform: translateY(-3px);
    }

    .passage-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .passage-meta {
      color: #64748b;
      font-size: 14px;
    }

    .empty-state {
      background: white;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid var(--line);
      color: #64748b;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-shell">
    <div class="container">
      <a class="top-link" href="/reading.html">← Back to Reading</a>

      <header class="hero-local">
        <h1>Read an Academic Passage</h1>
        <p>Select a passage to begin your practice.</p>
      </header>

      <section class="passage-list" id="passageList"></section>
    </div>
  </div>

  <script src="/read-an-academic-passage-questions.js"></script>

  <script>
    function start(id) {
      window.location.href = "/read-an-academic-passage-practice.html?id=" + id;
    }

    function formatDisplayDate(dateValue) {
      if (!dateValue) return "";
      if (Array.isArray(dateValue)) {
        return dateValue.map(formatSingleDate).join(" / ");
      }
      return formatSingleDate(dateValue);
    }

    function formatSingleDate(raw) {
      const str = String(raw).trim();
      if (/^\d{8}$/.test(str)) {
        return `${str.slice(0, 4)}-${str.slice(4, 6)}-${str.slice(6, 8)}`;
      }
      return str;
    }

    function renderPassageList() {
      const passageListEl = document.getElementById("passageList");
      const passages = window.academicPassages || {};

      const items = Object.values(passages)
        .filter(item => item && typeof item.id !== "undefined")
        .sort((a, b) => Number(a.id) - Number(b.id));

      if (!items.length) {
        passageListEl.innerHTML = `
          <div class="empty-state">
            No passages found. Please check read-an-academic-passage-questions.js.
          </div>
        `;
        return;
      }

      passageListEl.innerHTML = items.map(item => {
        const displayDate = formatDisplayDate(item.date);
        const dateLabel = Array.isArray(item.date) ? "Exam Dates" : "Exam Date";

        return `
          <div class="passage-card" onclick="start(${item.id})">
            <div class="passage-title">#${item.id} ${item.title}</div>
            <div class="passage-meta">
              ${displayDate ? `${dateLabel}: ${displayDate}` : "Click to start"}
            </div>
          </div>
        `;
      }).join("");
    }

    fetch('/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;

        document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
        const readingLink = document.querySelector('.nav-links a[href="/reading.html"]');
        if (readingLink) readingLink.classList.add('active');
      });

    renderPassageList();
  </script>
</body>
</html>
